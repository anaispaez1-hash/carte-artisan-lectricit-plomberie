<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisans Électricité Plomberie – Bassin Nantais</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lm-green:#78BE20; --lm-green2:#5a9018; --lm-black:#000000;
    --lm-gray:#515151; --lm-lgray:#e8e8e8; --lm-white:#FFFFFF; --lm-bg:#f5f5f5;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--lm-white);color:var(--lm-black);}

  /* HEADER */
  #hd{height:54px;background:var(--lm-white);display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;border-bottom:3px solid var(--lm-green);box-shadow:0 2px 10px rgba(0,0,0,.12);position:relative;z-index:50;}
  .hl{display:flex;align-items:center;gap:10px;}
  #hd h1{font-size:1rem;font-weight:700;color:var(--lm-black);line-height:1.1;letter-spacing:.02em;}
  #hd h1 small{display:block;font-size:.52rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--lm-green2);}
  .hr{display:flex;align-items:center;gap:12px;}
  .hst{text-align:center;}
  .hsn{font-size:1.3rem;font-weight:700;color:var(--lm-green);line-height:1;}
  .hsl{font-size:.5rem;text-transform:uppercase;letter-spacing:.15em;color:var(--lm-gray);}
  #btnToggle{background:var(--lm-green);color:white;border:none;border-radius:5px;padding:7px 14px;
    font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.05em;
    font-family:'DM Sans',sans-serif;text-transform:uppercase;transition:background .2s;}
  #btnToggle:hover{background:var(--lm-green2);}

  /* LOGO SVG */
  .hlogo{height:38px;width:auto;border-radius:5px;}

  /* APP */
  #app{display:flex;height:calc(100vh - 54px);}

  /* SIDEBAR */
  #sb{width:270px;max-width:270px;background:var(--lm-white);border-right:2px solid var(--lm-lgray);
    display:flex;flex-direction:column;overflow:hidden;transition:max-width .3s ease,border-width .3s ease;
    flex-shrink:0;box-shadow:2px 0 8px rgba(0,0,0,.06);}
  #sb.hide{max-width:0!important;border-width:0!important;}
  .sbt{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--lm-black);background:var(--lm-white);padding:11px 14px 9px;
    border-bottom:3px solid var(--lm-green);flex-shrink:0;white-space:nowrap;}
  .sbs{overflow-y:auto;flex:1;}
  .sbs::-webkit-scrollbar{width:3px;}
  .sbs::-webkit-scrollbar-thumb{background:var(--lm-green);border-radius:2px;}
  .sbf{padding:8px 12px;font-size:.56rem;color:var(--lm-gray);border-top:1px solid var(--lm-lgray);text-align:center;flex-shrink:0;white-space:nowrap;}

  /* CARDS */
  .ac{padding:10px 12px;border-bottom:1px solid var(--lm-lgray);cursor:pointer;transition:background .15s;position:relative;background:var(--lm-white);}
  .ac:hover{background:#f0f9e8;}
  .at{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .astr{width:4px;height:34px;border-radius:2px;flex-shrink:0;}
  .ai{flex:1;min-width:0;}
  .an{font-size:.82rem;font-weight:600;color:var(--lm-black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .aco{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .az{margin-top:4px;display:block;background:var(--lm-bg);border:1px solid var(--lm-lgray);border-radius:3px;padding:2px 6px;font-size:.58rem;color:var(--lm-gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lt{position:absolute;right:10px;top:12px;width:24px;height:14px;background:var(--lm-lgray);border-radius:7px;cursor:pointer;border:1px solid #ccc;transition:background .2s;}
  .lt.on{background:var(--lm-green);}
  .lt::after{content:'';position:absolute;width:10px;height:10px;background:white;border-radius:50%;top:1px;left:1px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .lt.on::after{transform:translateX(10px);}

  /* MAP */
  #map{flex:1;min-width:0;z-index:1;}

  /* MARQUEURS */
  .mw{display:inline-flex;flex-direction:column;align-items:center;cursor:pointer;}
  .mp{display:flex;align-items:center;gap:5px;background:white;border-radius:20px;padding:4px 10px 4px 6px;
    box-shadow:0 2px 8px rgba(0,0,0,.3),0 0 0 2px rgba(0,0,0,.08);white-space:nowrap;}
  .md{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .mco{font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.1;}
  .mpe{font-size:.56rem;color:var(--lm-gray);line-height:1.2;}
  .mta{width:2px;height:7px;border-radius:1px;}
  .mti{width:7px;height:7px;border-radius:50%;border:2px solid white;}

  /* POPUP */
  .leaflet-popup-content-wrapper{background:white!important;border-radius:8px!important;box-shadow:0 8px 30px rgba(0,0,0,.2)!important;border:2px solid var(--lm-green)!important;font-family:'DM Sans',sans-serif!important;padding:0!important;overflow:hidden;}
  .leaflet-popup-tip{background:var(--lm-green)!important;}
  .leaflet-popup-close-button{color:var(--lm-gray)!important;right:8px!important;top:8px!important;font-size:18px!important;font-weight:bold!important;}
  .leaflet-popup-content{margin:0!important;width:auto!important;}
  .ph{display:flex;align-items:center;gap:10px;padding:12px 34px 10px 12px;background:var(--lm-black);}
  .pi{width:80px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:transparent;overflow:hidden;border:none;}
  .pi img{width:100%;height:100%;object-fit:contain;border-radius:4px;}
  .pc{font-size:.98rem;font-weight:700;color:white;line-height:1.2;}
  .pn{font-size:.66rem;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
  .pb{padding:10px 12px;}
  .pr{display:flex;gap:6px;align-items:flex-start;margin-bottom:4px;font-size:.74rem;color:var(--lm-black);line-height:1.4;}
  .pdv{border:none;border-top:1px solid var(--lm-lgray);margin:7px 0;}
  .pst{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:var(--lm-green2);font-weight:700;margin-bottom:4px;}
  .stag{display:inline-block;background:#f0f9e8;border:1px solid var(--lm-green);border-radius:3px;padding:2px 5px;margin:1px 2px 1px 0;font-size:.63rem;color:var(--lm-black);}
  .btag{display:inline-block;background:var(--lm-black);border-radius:3px;padding:2px 7px;font-size:.63rem;color:var(--lm-green);font-weight:700;margin:0 3px 5px 0;}
  .congé{display:inline-block;background:#FFF9C4;border:1px solid #F9A825;border-radius:4px;padding:3px 8px;font-size:.65rem;color:#E65100;font-weight:700;margin-bottom:6px;}
  .leaflet-control-zoom a{background:var(--lm-black)!important;color:white!important;border-color:var(--lm-gray)!important;}
  .leaflet-control-zoom a:hover{background:var(--lm-gray)!important;}
  .leaflet-tooltip{background:var(--lm-black)!important;border:1px solid var(--lm-green)!important;color:white!important;font-family:'DM Sans',sans-serif!important;font-size:.72rem!important;border-radius:5px!important;padding:4px 9px!important;}

  @media(max-width:700px){
    #hd h1{font-size:.88rem;}
    .hst{display:none;}
    #app{flex-direction:column;}
    #sb{width:100%!important;max-width:100%!important;height:50vh;min-width:0;transition:height .3s ease;}
    #sb.hide{height:0!important;}
    #map{flex:1;min-height:100px;}
    #btnToggle{font-size:.62rem;padding:5px 10px;}
  }
</style>
</head>

<div id="hd">

    <svg width="110" height="38" viewBox="0 0 110 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0" class="hlogo">

      <text x="7" y="13" font-family="Arial,sans-serif" font-size="7.5" font-weight="900" fill="white" letter-spacing="0.5">LEROY MERLIN</text>
      <rect x="7" y="16" width="96" height="1.5" fill="white" opacity="0.6"/>
      <text x="7" y="28" font-family="Arial,sans-serif" font-size="8" font-weight="900" fill="white" letter-spacing="0.5">ÉLEC · PLOMBERIE</text>

</div>

  <div id="map"></div>
</div>

var map=L.map('map',{center:[47.22,-1.55],zoom:9});
window.leafletMap=map;
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

var layers={}, visCnt=6;

function mkZone(a){
  var o={color:a.color,fillColor:a.color,fillOpacity:.12,weight:2.5,dashArray:'6 4',opacity:.9};
  return a.zone_type==='circle'
    ?L.circle(a.zone_center,Object.assign({radius:a.zone_radius},o))
    :L.polygon(a.zone_coords,o);
}

function mkMarker(a){
  var h='<div class="mw"><div class="mp"><div class="md" style="background:'+a.color+'"></div><div><div class="mco" style="color:'+a.color+'">'+a.company+'</div><div class="mpe">'+a.name+'</div></div></div><div class="mta" style="background:'+a.color+'"></div><div class="mti" style="background:'+a.color+'"></div></div>';
  var icon=L.divIcon({html:h,className:'',iconSize:[200,58],iconAnchor:[100,58],popupAnchor:[0,-62]});
  var badges=a.badge?a.badge.split('|').map(function(b){return'<span class="btag">'+b.trim()+'</span>';}).join(''):'';
  var avis=a.avis?'<div class="pr"><span class="ic">🌟</span><span style="color:#E65100;font-weight:600">'+a.avis+'</span></div>':'';
  var phone2=a.phone2?'<div class="pr"><span class="ic">📞</span><span>'+a.phone2+'</span></div>':'';
  var svcs=a.services.map(function(s){return'<span class="stag">'+s+'</span>';}).join('');
  var pop='<div><div class="ph"><div class="pi"><img src="'+a.logo+'" alt="'+a.company+'"></div><div><div class="pc">'+a.company+'</div><div class="pn">'+a.name+'</div></div></div>'
    +'<div class="pb">'+(badges?'<div style="margin-bottom:6px">'+badges+'</div>':'')
    +'<div class="pr"><span class="ic">📍</span><span>'+a.address+'</span></div>'
    +'<div class="pr"><span class="ic">📞</span><span>'+a.phone+'</span></div>'
    +phone2
    +'<div class="pr"><span class="ic">✉️</span><span style="word-break:break-all">'+a.email+'</span></div>'
    +avis
    +'<div class="pr"><span class="ic">🚗</span><span style="color:'+a.color+';font-weight:600">'+a.zone_text+'</span></div>'
    +'<div class="pr"><span class="ic">⏱️</span><span>Délai : <strong>'+a.delai+'</strong></span></div>'
    +'<hr class="pdv"/><div class="pst">Prestations</div><div>'+svcs+'</div></div></div>';
  return L.marker([a.lat,a.lng],{icon:icon})
    .bindPopup(pop,{maxWidth:320,minWidth:270})
    .bindTooltip('<b>'+a.company+'</b> · '+a.name,{direction:'top',offset:[0,-62],opacity:.97});
}

var cards=document.getElementById('cards');
artisans.forEach(function(a){
  var z=mkZone(a),m=mkMarker(a);
  z.addTo(map);m.addTo(map);
  layers[a.id]={z:z,m:m,on:true};

  var c=document.createElement('div');c.className='ac';
  c.innerHTML='<div class="lt on" id="t'+a.id+'"></div>'
    +'<div class="at"><div class="astr" style="background:'+a.color+'"></div>'
    +'<div class="ai"><div class="an">'+a.name+'</div><div class="aco" style="color:'+a.color+'">'+a.company+'</div></div></div>'
    +'<span class="az">🚗 '+a.zone_text+'</span>';

  c.addEventListener('click',function(e){
    if(e.target.classList.contains('lt'))return;
    map.flyTo([a.lat,a.lng],11,{duration:1});
    if(window.innerWidth<=700){document.getElementById('sb').classList.add('hide');document.getElementById('btnToggle').textContent='▌ Afficher';}
    setTimeout(function(){m.openPopup();},950);
  });

  c.querySelector('#t'+a.id).addEventListener('click',function(e){
    e.stopPropagation();
    var l=layers[a.id];l.on=!l.on;
    this.classList.toggle('on',l.on);
    if(l.on){z.addTo(map);m.addTo(map);visCnt++;}
    else{map.removeLayer(z);map.removeLayer(m);visCnt--;}
    document.getElementById('cnt').textContent=visCnt;
  });

  cards.appendChild(c);
});

var bds=artisans.map(function(a){
  return a.zone_type==='circle'?L.circle(a.zone_center,{radius:a.zone_radius}).getBounds():L.polygon(a.zone_coords).getBounds();
});
var bb=bds[0];bds.slice(1).forEach(function(x){bb=bb.extend(x);});
map.fitBounds(bb,{padding:[30,30]});

var legend=L.control({position:'bottomleft'});
legend.onAdd=function(){
  var d=L.DomUtil.create('div');
  d.style.cssText='background:white;padding:8px 10px;border-radius:6px;border:1px solid #ddd;font-family:DM Sans,sans-serif;font-size:.62rem;box-shadow:0 2px 8px rgba(0,0,0,.15);max-width:180px;';
  var html='<div style="font-weight:700;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#515151;margin-bottom:5px;border-bottom:2px solid #78BE20;padding-bottom:4px;">Zones de déplacement</div>';
  artisans.forEach(function(a){
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">'
      +'<div style="width:12px;height:12px;border-radius:2px;background:'+a.color+';flex-shrink:0;"></div>'
      +'<span style="color:#000;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+a.company+'</span></div>';
  });
  d.innerHTML=html;
  L.DomEvent.disableClickPropagation(d);
  return d;
};
legend.addTo(map);

</script>
